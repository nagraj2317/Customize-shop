<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize shop - 3D Printing Store</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 4rem); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuATW-JUjY9ndWSbc4ojq8vWpC1n0ej98",
            authDomain: "apex3d-e63c2.firebaseapp.com",
            projectId: "apex3d-e63c2",
            storageBucket: "apex3d-e63c2.firebasestorage.app",
            messagingSenderId: "72705618242",
            appId: "1:72705618242:web:7d8e2343e8effc847d18db",
            measurementId: "G-YB6DG4PTPN"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        
        window.fb = { collection, doc, setDoc, deleteDoc, onSnapshot, getDoc };
        window.fbAuth = { signInWithEmailAndPassword, createUserWithEmailAndPassword, updatePassword };
        
        console.log("Firebase system ready.");
    </script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        // ==========================================
        // 1. ICONS
        // ==========================================
        const Icons = {
            Home: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>,
            ShoppingCart: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
            User: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            PackagePlus: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M16 16h6"/><path d="M19 13v6"/><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14"/><path d="m7.5 4.27 9 5.15"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" x2="12" y1="22" y2="12"/></svg>,
            PenTool: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>,
            LayoutDashboard: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,
            Trash2: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            ArrowLeft: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
            LogOut: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
        };

        // ==========================================
        // 2. STATE MANAGEMENT & AUTO CLEANUP
        // ==========================================
        const AppContext = createContext(undefined);

        function AppProvider({ children }) {
            const [isFirebaseReady, setIsFirebaseReady] = useState(false);
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem('app_user');
                return saved ? JSON.parse(saved) : null;
            });
            const [invitedAdmins, setInvitedAdmins] = useState(['sachin2317u@gmail.com']); 
            const [products, setProducts] = useState([]); 
            const [orders, setOrders] = useState([]);
            const [customRequests, setCustomRequests] = useState([]);
            const [cart, setCart] = useState(() => {
                const saved = localStorage.getItem('app_cart');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.fb && window.db && window.fbAuth && window.auth) {
                        setIsFirebaseReady(true);
                        clearInterval(checkFirebase);
                    }
                }, 50);
                return () => clearInterval(checkFirebase);
            }, []);

            useEffect(() => { 
                if(user) localStorage.setItem('app_user', JSON.stringify(user)); 
                else localStorage.removeItem('app_user'); 
            }, [user]);
            
            useEffect(() => { localStorage.setItem('app_cart', JSON.stringify(cart)); }, [cart]);

            useEffect(() => {
                if (!isFirebaseReady) return;

                const unsubProducts = window.fb.onSnapshot(window.fb.collection(window.db, "products"), (snapshot) => {
                    const prods = [];
                    snapshot.forEach(doc => prods.push(doc.data()));
                    setProducts(prods);

                    if (cart && cart.length > 0) {
                        const validProductIds = prods.map(p => p.id);
                        setCart(prevCart => prevCart.filter(item => validProductIds.includes(item.id)));
                    }
                });

                const unsubOrders = window.fb.onSnapshot(window.fb.collection(window.db, "orders"), (snapshot) => {
                    const ords = [];
                    snapshot.forEach(doc => ords.push(doc.data()));
                    ords.sort((a, b) => b.id.localeCompare(a.id)); 
                    setOrders(ords);
                });

                const unsubRequests = window.fb.onSnapshot(window.fb.collection(window.db, "customRequests"), (snapshot) => {
                    const reqs = [];
                    snapshot.forEach(doc => reqs.push(doc.data()));
                    reqs.sort((a, b) => b.id.localeCompare(a.id));
                    setCustomRequests(reqs);
                });

                let unsubUser = () => {};
                if (user && user.email) {
                    const cleanEmailId = user.email.replace(/[.#$/\[\]]/g, "_");
                    unsubUser = window.fb.onSnapshot(window.fb.doc(window.db, "users", cleanEmailId), (docSnap) => {
                        if (docSnap.exists()) {
                            setUser(docSnap.data());
                        }
                    });
                }

                return () => {
                    unsubProducts(); unsubOrders(); unsubRequests(); unsubUser();
                };
            }, [isFirebaseReady, user?.email]);

            const addOrUpdateProduct = async (prod) => {
                if (!isFirebaseReady) return;
                await window.fb.setDoc(window.fb.doc(window.db, "products", prod.id), prod);
            };
            const deleteProduct = async (id) => {
                if (!isFirebaseReady) return;
                await window.fb.deleteDoc(window.fb.doc(window.db, "products", id));
            };
            const addOrder = async (order) => {
                if (!isFirebaseReady) return;
                await window.fb.setDoc(window.fb.doc(window.db, "orders", order.id), order);
            };
            const updateOrderStatus = async (orderId, newStatus) => {
                if (!isFirebaseReady) return;
                const order = orders.find(o => o.id === orderId);
                if (order) {
                    const updated = { ...order, status: newStatus };
                    await window.fb.setDoc(window.fb.doc(window.db, "orders", orderId), updated);
                }
            };
            const cancelOrderPermanently = async (orderId) => {
                if (!isFirebaseReady) return;
                const order = orders.find(o => o.id === orderId);
                if (!order) return;
                if (order.status === 'Shipped' || order.status === 'Delivered') {
                    alert("Order is Shipped/Delivered and cannot be modified."); return;
                }
                const updated = { ...order, status: 'Cancelled' };
                await window.fb.setDoc(window.fb.doc(window.db, "orders", orderId), updated);
            };
            const saveUserProfileInDatabase = async (updatedData, newPassword = "") => {
                if (!isFirebaseReady) return;
                const cleanEmail = updatedData.email.replace(/[.#$/\[\]]/g, "_");
                await window.fb.setDoc(window.fb.doc(window.db, "users", cleanEmail), updatedData, { merge: true });
                if (newPassword && window.auth.currentUser) {
                    try { await window.fbAuth.updatePassword(window.auth.currentUser, newPassword); } catch (err) { console.error(err); }
                }
                setUser(updatedData);
            };
            const addCustomRequest = async (req) => {
                if (!isFirebaseReady) return;
                await window.fb.setDoc(window.fb.doc(window.db, "customRequests", req.id), req);
            };
            const deleteCustomRequest = async (id) => {
                if (!isFirebaseReady) return;
                await window.fb.deleteDoc(window.fb.doc(window.db, "customRequests", id));
            };

            const addToCart = (product, selectedSize) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id && item.selectedSize?.name === selectedSize?.name);
                    if (existing) return prev.map(item => item === existing ? { ...item, quantity: item.quantity + 1 } : item);
                    return [...prev, { ...product, selectedSize, quantity: 1, referenceFile: '', fileToCustomer: product.fileToCustomer === true }];
                });
            };
            const updateCartItemFile = (index, fileBase64) => {
                setCart(prev => prev.map((item, i) => i === index ? { ...item, referenceFile: fileBase64 } : item));
            };
            const removeFromCart = (index) => setCart(prev => prev.filter((_, i) => i !== index));
            const updateQuantity = (index, quantity) => setCart(prev => prev.map((item, i) => i === index ? { ...item, quantity } : item));
            const clearCart = () => setCart([]);

            if (!isFirebaseReady) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50">
                        <div className="text-center">
                            <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-slate-600 font-bold text-lg">Loading Store...</p>
                        </div>
                    </div>
                );
            }

            return (
                <AppContext.Provider value={{ 
                    user, setUser, invitedAdmins, setInvitedAdmins, products, addOrUpdateProduct, deleteProduct, 
                    cart, addToCart, removeFromCart, updateQuantity, clearCart, updateCartItemFile,
                    orders, addOrder, updateOrderStatus, cancelOrderPermanently, customRequests, addCustomRequest, deleteCustomRequest, saveUserProfileInDatabase
                }}>
                    {children}
                </AppContext.Provider>
            );
        }
        const useStore = () => useContext(AppContext);

        // ==========================================
        // 3. COMPONENTS
        // ==========================================
        function HomePage({ setCurrentTab, setSelectedProduct }) {
            const { products, addToCart } = useStore();
            return (
                <div className="max-w-7xl mx-auto px-4 py-6 pb-24">
                    <div className="mb-8">
                        <h1 className="text-3xl font-bold text-slate-900">Customize shop</h1>
                        <p className="text-slate-500 mt-1">Discover unique 3D creations</p>
                    </div>
                    <div className="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
                        {products.length === 0 ? (
                            <div className="col-span-full text-center py-20 bg-white rounded-xl border text-slate-500">No products available.</div>
                        ) : (
                            products.map(product => <ProductCard key={product.id} product={product} addToCart={addToCart} setCurrentTab={setCurrentTab} setSelectedProduct={setSelectedProduct} />)
                        )}
                    </div>
                </div>
            );
        }

        function ProductCard({ product, addToCart, setCurrentTab, setSelectedProduct }) {
            const [selectedSizeIndex, setSelectedSizeIndex] = useState(0);
            const hasSizes = product.sizes && product.sizes.length > 0;
            const currentSize = hasSizes ? product.sizes[selectedSizeIndex] : { name: 'Standard', price: product.price || 0 };
            const mainImage = product.images && product.images.length > 0 ? product.images[0] : 'https://via.placeholder.com/300?text=No+Image';

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden group flex flex-col">
                    <div onClick={() => { setSelectedProduct(product); setCurrentTab('details'); }} className="cursor-pointer aspect-square bg-slate-100 overflow-hidden relative">
                        <img src={mainImage} alt={product.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                        {product.fileToCustomer && (
                            <span className="absolute top-2 left-2 bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow">Customizable</span>
                        )}
                    </div>
                    <div className="p-3 sm:p-5 flex-1 flex flex-col">
                        <span className="text-[10px] sm:text-xs font-semibold text-blue-600 uppercase mb-1">{product.category}</span>
                        <h3 onClick={() => { setSelectedProduct(product); setCurrentTab('details'); }} className="cursor-pointer font-bold text-sm sm:text-lg text-slate-900 mb-1 line-clamp-1 hover:text-blue-600">{product.name}</h3>
                        {hasSizes && (
                            <div className="mt-2 mb-3">
                                <select className="w-full border border-slate-300 rounded p-1 text-xs sm:text-sm bg-slate-50 outline-none" value={selectedSizeIndex} onChange={(e) => setSelectedSizeIndex(e.target.value)}>
                                    {product.sizes.map((s, i) => <option key={i} value={i}>{s.name} - ₹{s.price}</option>)}
                                </select>
                            </div>
                        )}
                        <div className="mt-auto flex items-center justify-between">
                            <span className="text-sm sm:text-xl font-bold text-slate-900">₹{parseFloat(currentSize.price || 0).toFixed(2)}</span>
                            <button onClick={() => { addToCart(product, currentSize); alert('Added to cart!'); }} className="bg-slate-900 text-white p-2 rounded-lg hover:bg-slate-800 transition-colors">
                                <Icons.ShoppingCart className="w-4 h-4 sm:w-5 sm:h-5" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function ProductDetailsPage({ product, setCurrentTab }) {
            const { addToCart } = useStore();
            const [selectedSizeIndex, setSelectedSizeIndex] = useState(0);
            if (!product) return null;
            const hasSizes = product.sizes && product.sizes.length > 0;
            const currentSize = hasSizes ? product.sizes[selectedSizeIndex] : { name: 'Standard', price: product.price || 0 };

            return (
                <div className="max-w-4xl mx-auto bg-white min-h-screen pb-24 border-x shadow-sm">
                    <div className="p-4 border-b flex items-center gap-3 sticky top-0 bg-white z-10 shadow-sm">
                        <button onClick={() => setCurrentTab('home')} className="text-slate-600 p-2 bg-slate-100 rounded-full"><Icons.ArrowLeft className="w-5 h-5" /></button>
                        <h1 className="text-lg font-bold line-clamp-1">{product.name}</h1>
                    </div>
                    <div className="p-4 sm:p-6">
                        <h2 className="text-2xl sm:text-3xl font-extrabold text-slate-900 mb-4">{product.name}</h2>
                        <div className="flex overflow-x-auto gap-4 pb-4 hide-scrollbar">
                            {(product.images || ['https://via.placeholder.com/300']).map((img, idx) => (
                                <img key={idx} src={img} className="w-[85%] sm:w-[400px] h-[300px] sm:h-[400px] object-cover rounded-xl border flex-shrink-0" />
                            ))}
                        </div>
                        <p className="text-slate-600 my-6">{product.description}</p>
                        <div className="p-5 bg-slate-50 rounded-xl border">
                            {hasSizes && (
                                <div className="mb-4">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Select Size:</label>
                                    <select className="w-full sm:w-1/2 border p-3 bg-white" value={selectedSizeIndex} onChange={(e) => setSelectedSizeIndex(e.target.value)}>
                                        {product.sizes.map((s, i) => <option key={i} value={i}>{s.name} - ₹{s.price}</option>)}
                                    </select>
                                </div>
                            )}
                            <div className="flex items-center justify-between mt-4 pt-4 border-t">
                                <span className="text-3xl font-black text-slate-900">₹{parseFloat(currentSize.price || 0).toFixed(2)}</span>
                                <button onClick={() => { addToCart(product, currentSize); alert('Added to cart!'); }} className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg">
                                    <Icons.ShoppingCart className="w-5 h-5" /> Add to Cart
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function CustomRequestPage({ setCurrentTab }) {
            const { user, addCustomRequest } = useStore();
            const [modelName, setModelName] = useState('');
            const [instructions, setInstructions] = useState('');
            const [image, setImage] = useState('');
            const [submitting, setSubmitting] = useState(false);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setImage(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!user) { setCurrentTab('auth'); return; }
                setSubmitting(true);
                const requestPayload = {
                    id: 'REQ-' + Date.now(), userId: user.email, userName: user.name || 'Anonymous', userMobile: user.mobile || 'N/A',
                    modelName, instructions, image, date: new Date().toLocaleDateString(), status: 'Pending'
                };
                addCustomRequest(requestPayload).then(() => {
                    alert('Request submitted!'); setModelName(''); setInstructions(''); setImage(''); setSubmitting(false); setCurrentTab('profile');
                });
            };

            return (
                <div className="max-w-2xl mx-auto px-4 py-6 pb-24">
                    <div className="bg-white p-6 rounded-xl border shadow-sm">
                        <h1 className="text-3xl font-bold text-slate-900 mb-6 text-center">Custom 3D Request</h1>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input type="text" placeholder="Title" required className="w-full p-2 border rounded" value={modelName} onChange={e => setModelName(e.target.value)} />
                            <textarea rows="4" placeholder="Specifications..." required className="w-full p-2 border rounded" value={instructions} onChange={e => setInstructions(e.target.value)} />
                            <input type="file" accept="image/*" required className="w-full p-2 border bg-slate-50 rounded" onChange={handleImageUpload} />
                            {image && <img src={image} className="w-32 h-32 object-cover border rounded-lg" />}
                            <button type="submit" disabled={submitting} className="w-full py-3 bg-blue-600 text-white font-bold rounded-lg">{submitting ? 'Submitting...' : 'Submit Request'}</button>
                        </form>
                    </div>
                </div>
            );
        }

        function CartPage({ setCurrentTab }) {
            const { cart, removeFromCart, updateQuantity, clearCart, user, addOrder, updateCartItemFile } = useStore();
            const [isCheckingOut, setIsCheckingOut] = useState(false);
            const [success, setSuccess] = useState(false);
            
            let total = 0;
            if (cart && Array.isArray(cart) && cart.length > 0) {
                cart.forEach(item => {
                    const rawPrice = item.selectedSize?.price || item.price || 0;
                    total += (parseFloat(rawPrice) * (parseInt(item.quantity, 10) || 1));
                });
            }

            const handleFileChange = (index, e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => updateCartItemFile(index, reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleCheckout = () => {
                if (!user) { setCurrentTab('auth'); return; }
                if (!cart || cart.length === 0) return;
                const missingFiles = cart.some(item => item.fileToCustomer === true && !item.referenceFile);
                if (missingFiles) {
                    alert("ભૂલ: આ પ્રોડક્ટ માટે તમારો ફોટો/ડિઝાઇન ફાઇલ અપલોડ કરવી ફરજિયાત છે!"); return;
                }
                setIsCheckingOut(true);
                const newOrder = { 
                    id: 'ORD-' + Date.now(), userId: user.email, 
                    address: { name: user.name || 'N/A', mobile: user.mobile || 'N/A', village: user.village || 'N/A', locality: user.locality || 'N/A', pincode: user.pincode || 'N/A', country: 'India' }, 
                    items: [...cart], total, date: new Date().toLocaleDateString(), status: 'Pending'
                };
                addOrder(newOrder).then(() => {
                    clearCart(); setSuccess(true);
                    setTimeout(() => { setIsCheckingOut(false); setCurrentTab('profile'); }, 2000);
                });
            };

            if (success) return <div className="p-8 text-center font-bold text-green-600">Order Confirmed Successfully!</div>;

            return (
                <div className="max-w-4xl mx-auto px-4 py-6 pb-24">
                    <h1 className="text-3xl font-bold text-slate-900 mb-8">Shopping Cart</h1>
                    {!cart || cart.length === 0 ? (
                        <div className="text-center py-20 bg-white rounded-xl border"><p>Your cart is empty.</p></div>
                    ) : (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 space-y-4">
                                {cart.map((item, index) => {
                                    const displayPrice = item.selectedSize?.price || item.price || 0;
                                    return (
                                        <div key={index} className="bg-white p-4 rounded-xl border shadow-sm space-y-4">
                                            <div className="flex flex-col sm:flex-row items-center gap-4">
                                                <img src={item.images?.[0] || 'https://via.placeholder.com/100'} className="w-24 h-24 rounded-lg object-cover border" />
                                                <div className="flex-1 text-center sm:text-left">
                                                    <h3 className="font-semibold text-slate-900">{item.name || 'Product'}</h3>
                                                    <p className="font-bold text-blue-600">₹{parseFloat(displayPrice).toFixed(2)}</p>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <button className="px-2 bg-slate-100 rounded" onClick={() => updateQuantity(index, Math.max(1, item.quantity - 1))}>-</button>
                                                    <span className="w-8 text-center">{item.quantity}</span>
                                                    <button className="px-2 bg-slate-100 rounded" onClick={() => updateQuantity(index, item.quantity + 1)}>+</button>
                                                    <button onClick={() => removeFromCart(index)} className="text-red-500 ml-4"><Icons.Trash2 className="w-5 h-5 inline" /></button>
                                                </div>
                                            </div>
                                            {item.fileToCustomer === true && (
                                                <div className="bg-blue-50/50 p-3 rounded-lg border text-xs">
                                                    <label className="block font-bold mb-1 text-blue-900">Upload Photo (REQUIRED):</label>
                                                    <input type="file" accept="image/*" onChange={(e) => handleFileChange(index, e)} />
                                                    {item.referenceFile && <img src={item.referenceFile} className="w-10 h-10 object-cover mt-1 rounded border" />}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="lg:col-span-1">
                                <div className="bg-white p-6 rounded-xl border shadow-sm">
                                    <div className="flex justify-between font-bold text-lg mb-4"><span>Total</span><span>₹{total.toFixed(2)}</span></div>
                                    <button onClick={handleCheckout} disabled={isCheckingOut} className="w-full py-3 bg-blue-600 text-white font-bold rounded-lg">Checkout Order</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ProfilePage({ setCurrentTab }) {
            const { user, setUser, orders, saveUserProfileInDatabase } = useStore();
            const [isEditing, setIsEditing] = useState(false);
            const [profileForm, setProfileForm] = useState({ name: '', mobile: '', village: '', locality: '', pincode: '', password: '' });

            useEffect(() => {
                if (user) {
                    setProfileForm({ name: user.name || '', mobile: user.mobile || '', village: user.village || '', locality: user.locality || '', pincode: user.pincode || '', password: user.password || '' });
                }
            }, [user, isEditing]);

            if (!user) return null;
            const myOrders = orders.filter(o => o.userId === user.email);

            return (
                <div className="max-w-4xl mx-auto px-4 py-6 pb-24">
                    <div className="flex justify-between items-center mb-8 border-b pb-4">
                        <h1 className="text-3xl font-bold">My Profile</h1>
                        <button onClick={() => { setUser(null); setCurrentTab('home'); }} className="text-red-600 font-bold">Logout</button>
                    </div>
                    <div className="bg-white p-6 rounded-xl border mb-8 shadow-sm">
                        <div className="flex justify-between items-center mb-4 pb-2 border-b">
                            <h2 className="font-bold text-lg">Account Details</h2>
                            <button onClick={() => { if(isEditing || prompt("Enter Password to unlock:") === user.password) setIsEditing(!isEditing); }} className="text-sm bg-blue-50 text-blue-600 px-3 py-1 rounded font-bold">
                                {isEditing ? 'Cancel' : 'Edit'}
                            </button>
                        </div>
                        {!isEditing ? (
                            <div className="space-y-2 text-sm">
                                <p><strong>Name:</strong> {user.name}</p>
                                <p><strong>Email:</strong> {user.email}</p>
                                <p><strong>Mobile:</strong> {user.mobile}</p>
                                <p><strong>Address:</strong> {user.village}, {user.locality}, {user.pincode}</p>
                            </div>
                        ) : (
                            <form onSubmit={async (e) => { e.preventDefault(); await saveUserProfileInDatabase({...user, ...profileForm}, profileForm.password); setIsEditing(false); }} className="space-y-3">
                                <input type="text" className="w-full p-2 border rounded text-sm" value={profileForm.name} onChange={e => setProfileForm({...profileForm, name: e.target.value})} placeholder="Name" />
                                <input type="tel" className="w-full p-2 border rounded text-sm" value={profileForm.mobile} onChange={e => setProfileForm({...profileForm, mobile: e.target.value})} placeholder="Mobile" />
                                <input type="text" className="w-full p-2 border rounded text-sm" value={profileForm.village} onChange={e => setProfileForm({...profileForm, village: e.target.value})} placeholder="Village" />
                                <input type="text" className="w-full p-2 border rounded text-sm" value={profileForm.locality} onChange={e => setProfileForm({...profileForm, locality: e.target.value})} placeholder="Locality" />
                                <input type="number" className="w-full p-2 border rounded text-sm" value={profileForm.pincode} onChange={e => setProfileForm({...profileForm, pincode: e.target.value})} placeholder="Pincode" />
                                <input type="text" className="w-full p-2 border rounded text-sm" value={profileForm.password} onChange={e => setProfileForm({...profileForm, password: e.target.value})} placeholder="New Password" />
                                <button type="submit" className="bg-green-600 text-white font-bold text-sm px-4 py-2 rounded-lg shadow">Save Info</button>
                            </form>
                        )}
                    </div>
                    <h2 className="font-bold text-xl mb-4">Orders (Permanent Records)</h2>
                    <div className="space-y-4">
                        {myOrders.map(o => (
                            <div key={o.id} className="bg-white p-4 rounded-xl border shadow-sm">
                                <div className="flex justify-between font-bold border-b pb-2"><span>ID: {o.id}</span><span>{o.date}</span></div>
                                <div className="my-2 text-sm font-bold text-orange-600">Status: {o.status}</div>
                                {(o.items || []).map((i, idx) => (
                                    <div key={idx} className="flex justify-between text-xs py-1">
                                        <span>{i.quantity}x {i.name}</span>
                                        <span>₹{(parseFloat(i.selectedSize?.price || i.price || 0) * i.quantity).toFixed(2)}</span>
                                    </div>
                                ))}
                                <div className="font-bold border-t pt-2 mt-2 text-right">Total: ₹{(parseFloat(o.total) || 0).toFixed(2)}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ==========================================
        // ADMIN PANEL WITH CRASH-FREE PHOTO POPUP SYSTEM
        // ==========================================
        function AdminPage({ setCurrentTab }) {
            const { user, products, addOrUpdateProduct, deleteProduct, orders, updateOrderStatus, cancelOrderPermanently, customRequests, deleteCustomRequest, invitedAdmins } = useStore();
            const [adminTab, setAdminTab] = useState('products'); 
            const [view, setView] = useState('list');
            const [formData, setFormData] = useState({ id:'', name: '', description: '', category: '', images: [], fileToCustomer: false });
            const [sizeCount, setSizeCount] = useState(1);
            const [sizes, setSizes] = useState([{ name: '', price: '' }]);
            
            // NEW MODAL STATES FOR ENLARGING PHOTO WITHOUT CRASHING SCREEN
            const [selectedPreviewImage, setSelectedPreviewImage] = useState(null);

            if (!user || !invitedAdmins.includes(user.email)) return null;

            const handleSizeCountChange = (e) => {
                const count = parseInt(e.target.value, 10); setSizeCount(count);
                setSizes(prev => {
                    const newSizes = [...prev];
                    while(newSizes.length < count) newSizes.push({ name: '', price: '' });
                    newSizes.length = count; return newSizes;
                });
            };

            const handleSave = (e) => {
                e.preventDefault();
                const formattedSizes = sizes.map(s => ({ name: s.name, price: parseFloat(s.price) || 0 }));
                addOrUpdateProduct({ ...formData, sizes: formattedSizes, price: formattedSizes[0]?.price || 0 }).then(() => {
                    setFormData({ id:'', name: '', description: '', category: '', images: [], fileToCustomer: false }); setView('list');
                });
            };

            return (
                <div className="max-w-5xl mx-auto px-4 py-6 pb-24">
                    <h1 className="text-2xl font-bold mb-6">Admin Dashboard</h1>
                    <div className="flex gap-2 mb-6">
                        <button onClick={() => setAdminTab('products')} className={`px-4 py-2 font-bold rounded-lg ${adminTab === 'products' ? 'bg-slate-900 text-white' : 'bg-slate-200'}`}>Products</button>
                        <button onClick={() => setAdminTab('orders')} className={`px-4 py-2 font-bold rounded-lg ${adminTab === 'orders' ? 'bg-slate-900 text-white' : 'bg-slate-200'}`}>Orders Inbox</button>
                    </div>
                    
                    {adminTab === 'products' && (
                        <div>
                            <div className="flex justify-end mb-4">
                                {view === 'list' ? <button onClick={() => setView('add')} className="bg-blue-600 text-white px-4 py-2 rounded-lg">+ Add Product</button> : <button onClick={() => setView('list')} className="text-slate-600">Back</button>}
                            </div>
                            {view === 'list' && (
                                <div className="bg-white border rounded-xl overflow-hidden shadow-sm">
                                    <table className="w-full text-left text-sm text-slate-600">
                                        <tbody className="divide-y">
                                            {products.map(p => (
                                                <tr key={p.id} className="hover:bg-slate-50"><td className="px-6 py-4 font-medium text-slate-900">{p.name}</td><td className="px-6 py-4 text-right"><button onClick={() => deleteProduct(p.id)} className="text-red-600">Remove</button></td></tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                            {view === 'add' && (
                                <form onSubmit={handleSave} className="bg-white p-6 border rounded-xl space-y-4">
                                    <input type="text" placeholder="Product Name" required className="w-full p-2 border rounded" onChange={e => setFormData({...formData, id: 'p'+Date.now(), name: e.target.value})} />
                                    <input type="text" placeholder="Category" required className="w-full p-2 border rounded" onChange={e => setFormData({...formData, category: e.target.value})} />
                                    <textarea placeholder="Description" required className="w-full p-2 border rounded" onChange={e => setFormData({...formData, description: e.target.value})} />
                                    <div className="bg-blue-50 p-3 rounded-lg border flex items-center gap-3">
                                        <input type="checkbox" id="fileToCustomer" className="w-5 h-5 accent-blue-600 cursor-pointer" checked={formData.fileToCustomer} onChange={e => setFormData({...formData, fileToCustomer: e.target.checked})} />
                                        <label htmlFor="fileToCustomer" className="text-sm font-bold text-blue-950 cursor-pointer">File to Customer (ગ્રાહક પાસેથી ફોટો મંગાવવો)</label>
                                    </div>
                                    <select value={sizeCount} onChange={handleSizeCountChange} className="border p-2 rounded bg-white w-full">
                                        {[...Array(10)].map((_, i) => <option key={i+1} value={i+1}>{i+1} Size Options</option>)}
                                    </select>
                                    {sizes.map((size, idx) => (
                                        <div key={idx} className="flex gap-4">
                                            <input type="text" placeholder="Size Name" required className="w-1/2 p-2 border rounded" onChange={(e) => { const n=[...sizes]; n[idx].name=e.target.value; setSizes(n); }} />
                                            <input type="number" placeholder="Price" required className="w-1/2 p-2 border rounded" onChange={(e) => { const n=[...sizes]; n[idx].price=e.target.value; setSizes(n); }} />
                                        </div>
                                    ))}
                                    <button type="submit" className="w-full bg-slate-900 text-white p-3 rounded font-bold">Publish Product</button>
                                </form>
                            )}
                        </div>
                    )}

                    {adminTab === 'orders' && (
                        <div className="space-y-4">
                            {orders.map(o => (
                                <div key={o.id} className="bg-white p-5 border rounded-xl shadow-sm">
                                    <div className="flex justify-between font-bold border-b pb-2 mb-2"><span>ID: {o.id}</span><span className="text-blue-600">₹{(parseFloat(o.total) || 0).toFixed(2)}</span></div>
                                    <p className="text-sm">Client: {o.address?.name} ({o.address?.mobile})</p>
                                    <div className="bg-blue-50 border p-3 rounded-lg my-3 space-y-2">
                                        {(o.items || []).map((item, idx) => (
                                            <div key={idx} className="bg-white p-2 border rounded flex items-center justify-between gap-4">
                                                <div><p className="text-xs font-bold">{item.name} (x{item.quantity})</p></div>
                                                
                                                {/* FIXED CRASH LOGIC: Div Click instead of Anchor tags opens internal popup secure Modal */}
                                                {item.referenceFile && (
                                                    <div onClick={() => setSelectedPreviewImage(item.referenceFile)} className="block w-12 h-12 border rounded overflow-hidden cursor-pointer active:scale-95 transition-transform bg-slate-100">
                                                        <img src={item.referenceFile} className="w-full h-full object-cover" alt="Blueprint" />
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-4 flex justify-between items-center border-t pt-2">
                                        <span className="text-xs px-2.5 py-1 rounded font-bold bg-orange-100 text-orange-700">Status: {o.status}</span>
                                        <div className="flex gap-2">
                                            {o.status === 'Pending' && <button onClick={() => updateOrderStatus(o.id, 'Confirmed')} className="bg-blue-600 text-white text-xs px-3 py-1 rounded font-bold">Confirm</button>}
                                            {o.status === 'Confirmed' && <button onClick={() => updateOrderStatus(o.id, 'Shipped')} className="bg-purple-600 text-white text-xs px-3 py-1 rounded font-bold">Ship</button>}
                                            {o.status === 'Shipped' && <button onClick={() => updateOrderStatus(o.id, 'Delivered')} className="bg-green-600 text-white text-xs px-3 py-1 rounded font-bold">Deliver</button>}
                                            {o.status !== 'Cancelled' && o.status !== 'Delivered' && o.status !== 'Shipped' && <button onClick={() => cancelOrderPermanently(o.id)} className="bg-red-600 text-white text-xs px-3 py-1 rounded font-bold">Cancel Order</button>}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {adminTab === 'customReqs' && (
                        <div className="space-y-4">
                            {customRequests.map(req => (
                                <div key={req.id} className="bg-white p-5 border rounded-xl shadow-sm">
                                    <div className="flex justify-between font-bold"><h3>{req.modelName}</h3><span>{req.date}</span></div>
                                    <p className="text-sm text-slate-600 bg-slate-50 p-2 mt-2 rounded">{req.instructions}</p>
                                    <div className="pt-2 flex justify-end"><button onClick={() => deleteCustomRequest(req.id)} className="text-red-600 text-xs font-bold">Remove Request</button></div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* NEW CRASH-FREE ENLARGE POPUP BOX SYSTEM MODAL */}
                    {selectedPreviewImage && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex flex-col items-center justify-center p-4">
                            <div className="max-w-3xl w-full bg-white rounded-2xl overflow-hidden p-3 flex flex-col shadow-2xl animate-fade-in">
                                <div className="flex justify-between items-center mb-2 px-2">
                                    <span className="text-xs font-bold text-slate-500 uppercase tracking-wide">Customer Blueprint Design View</span>
                                    <button onClick={() => setSelectedPreviewImage(null)} className="bg-red-600 text-white font-bold text-xs px-4 py-1.5 rounded-lg active:scale-95 transition-transform">
                                        Close (બંધ કરો)
                                    </button>
                                </div>
                                <div className="w-full aspect-square md:max-h-[70vh] bg-slate-100 rounded-xl overflow-auto flex items-center justify-center border">
                                    <img src={selectedPreviewImage} className="max-w-full max-h-full object-contain rounded" alt="Enlarged Blueprint View" />
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        function AuthPage({ setCurrentTab }) {
            const { setUser } = useStore();
            const [isLogin, setIsLogin] = useState(true);
            const [formData, setFormData] = useState({ name: '', email: '', password: '', mobile: '', village: '', locality: '', pincode: '', country: 'India' });
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault(); setError('');
                if (!isLogin && formData.password.length < 6) {
                    setError('પાસવર્ડ ઓછામાં ઓછો 6 અક્ષરનો હોવો જોઈએ!'); return;
                }
                try {
                    const cleanEmail = formData.email.replace(/[.#$/\[\]]/g, "_");
                    if (isLogin) {
                        const credential = await window.fbAuth.signInWithEmailAndPassword(window.auth, formData.email, formData.password);
                        const docSnap = await window.fb.getDoc(window.fb.doc(window.db, "users", cleanEmail));
                        setUser(docSnap.exists() ? docSnap.data() : { email: credential.user.email, name: formData.email.split('@')[0], password: formData.password });
                    } else {
                        const credential = await window.fbAuth.createUserWithEmailAndPassword(window.auth, formData.email, formData.password);
                        const payload = { ...formData, uid: credential.user.uid };
                        await window.fb.setDoc(window.fb.doc(window.db, "users", cleanEmail), payload); setUser(payload);
                    }
                    setCurrentTab('home');
                } catch (err) { 
                    if (err.code === "auth/email-already-in-use") setError("આ ઇમેઇલ આઇડી પહેલેથી રજીસ્ટર છે!");
                    else setError("ખોટો ઇમેઇલ અથવા પાસવર્ડ!");
                }
            };

            return (
                <div className="max-w-md mx-auto mt-10 mb-24 bg-white p-8 border rounded-xl shadow-sm">
                    <h2 className="text-2xl font-bold text-center mb-6">{isLogin ? 'Sign In / લોગિન' : 'Create Account / રજીસ્ટ્રેશન'}</h2>
                    {error && <div className="mb-4 p-2 bg-red-50 text-red-600 text-center text-sm font-bold rounded">{error}</div>}
                    <form onSubmit={handleSubmit} className="space-y-4">
                        {!isLogin && (
                            <>
                                <input type="text" placeholder="પૂરું નામ (Full Name)" required className="w-full p-2 border rounded" onChange={e => setFormData({...formData, name: e.target.value})} />
                                <input type="tel" placeholder="મોબાઇલ નંબર (Mobile)" required className="w-full p-2 border rounded" onChange={e => setFormData({...formData, mobile: e.target.value})} />
                                <input type="text" placeholder="ગામ / şehir" required className="w-full p-2 border rounded" onChange={e => setFormData({...formData, village: e.target.value})} />
                                <input type="text" placeholder="વિસ્તાર / સોસાયટી" required className="w-full p-2 border rounded" onChange={e => setFormData({...formData, locality: e.target.value})} />
                                <input type="number" placeholder="પિનકોડ (Pincode)" required className="w-full p-2 border rounded" onChange={e => setFormData({...formData, pincode: e.target.value})} />
                            </>
                        )}
                        <input type="email" placeholder="ઇમેઇલ (Email)" required className="w-full p-2 border rounded" onChange={e => setFormData({...formData, email: e.target.value})} />
                        <input type="password" placeholder="પાસવર્ડ (Password)" required className="w-full p-2 border rounded" onChange={e => setFormData({...formData, password: e.target.value})} />
                        <button type="submit" className="w-full bg-blue-600 text-white py-2 rounded font-bold shadow">{isLogin ? 'Sign In' : 'Sign Up & Create Box'}</button>
                    </form>
                    <div className="mt-4 text-center text-sm"><button onClick={() => { setIsLogin(!isLogin); setError(''); }} className="text-blue-600 font-bold">{isLogin ? 'નવું ખાતું ખોલો' : 'લોગિન કરો'}</button></div>
                </div>
            );
        }

        function App() {
            const { cart, user, invitedAdmins } = useStore();
            const [currentTab, setCurrentTab] = useState('home');
            const [selectedProduct, setSelectedProduct] = useState(null); 
            const cartItemsCount = cart ? cart.reduce((acc, item) => acc + (parseInt(item.quantity, 10) || 1), 0) : 0;
            const isAdmin = user && invitedAdmins.includes(user.email);

            const navItems = [
                { id: 'home', label: 'Products', icon: Icons.Home },
                { id: 'custom', label: 'Custom', icon: Icons.PenTool },
                { id: 'cart', label: 'Cart', icon: Icons.ShoppingCart, badge: cartItemsCount },
                { id: 'profile', label: 'Profile', icon: Icons.User },
                ...(isAdmin ? [{ id: 'admin', label: 'Admin', icon: Icons.LayoutDashboard }] : [])
            ];

            return (
                <div className="min-h-screen">
                    <header className="bg-white border-b sticky top-0 z-40 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 h-14 flex justify-between items-center">
                            <button onClick={() => setCurrentTab('home')} className="text-xl font-bold text-slate-900 flex items-center gap-2"><Icons.PackagePlus className="w-6 h-6 text-blue-600" /> Customize shop</button>
                        </div>
                    </header>
                    <main>
                        {currentTab === 'home' && <HomePage setCurrentTab={setCurrentTab} setSelectedProduct={setSelectedProduct} />}
                        {currentTab === 'details' && <ProductDetailsPage product={selectedProduct} setCurrentTab={setCurrentTab} />}
                        {currentTab === 'cart' && <CartPage setCurrentTab={setCurrentTab} />}
                        {currentTab === 'custom' && <CustomRequestPage setCurrentTab={setCurrentTab} />}
                        {currentTab === 'profile' && <ProfilePage setCurrentTab={setCurrentTab} />}
                        {currentTab === 'admin' && <AdminPage setCurrentTab={setCurrentTab} />}
                        {currentTab === 'auth' && <AuthPage setCurrentTab={setCurrentTab} />}
                    </main>
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t pb-safe z-50">
                        <div className="flex justify-around items-center h-16 max-w-md mx-auto">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => { if ((item.id === 'profile' || item.id === 'custom') && !user) setCurrentTab('auth'); else setCurrentTab(item.id); }} className={`flex flex-col items-center justify-center w-full h-full ${currentTab === item.id || (item.id === 'home' && currentTab === 'details') ? 'text-blue-600' : 'text-slate-500'}`}>
                                    <div className="relative">
                                        <item.icon className="w-6 h-6" />
                                        {item.badge > 0 && <span className="absolute -top-1 -right-2 bg-blue-600 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center font-bold">{item.badge}</span>}
                                    </div>
                                    <span className="text-[10px] font-medium">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render((<AppProvider><App /></AppProvider>));
    </script>
</body>
</html>
