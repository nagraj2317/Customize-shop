<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize shop - 3D Printing Store</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 4rem); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        // ==========================================
        // 1. ICONS
        // ==========================================
        const Icons = {
            Home: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>,
            ShoppingCart: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
            User: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            PackagePlus: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M16 16h6"/><path d="M19 13v6"/><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14"/><path d="m7.5 4.27 9 5.15"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" x2="12" y1="22" y2="12"/></svg>,
            PenTool: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>,
            LayoutDashboard: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,
            Trash2: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            Edit: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>,
            Plus: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Minus: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M5 12h14"/></svg>,
            Upload: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
            CheckCircle: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>,
            CreditCard: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>,
            ArrowLeft: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
            LogOut: (props) => <svg className={props.className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
        };

        // ==========================================
        // 2. STATE MANAGEMENT
        // ==========================================
        const AppContext = createContext(undefined);

        function AppProvider({ children }) {
            const [user, setUser] = useState(null);
            const [invitedAdmins, setInvitedAdmins] = useState(['sachin2317u@gmail.com']); 
            
            const [products, setProducts] = useState([
                {
                    id: 'p1', name: '3D Printed Vase', category: 'Decor', price: 499, description: 'A beautiful 3D printed flower vase.',
                    images: ['https://via.placeholder.com/400/333333/FFFFFF?text=Photo+1', 'https://via.placeholder.com/400/555555/FFFFFF?text=Photo+2'],
                    sizes: [{name: 'Small', price: 499}, {name: 'Large', price: 899}]
                }
            ]); 
            const [cart, setCart] = useState([]);
            const [orders, setOrders] = useState([]);
            const [customRequests, setCustomRequests] = useState([]);

            const addToCart = (product, selectedSize) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id && item.selectedSize?.name === selectedSize?.name);
                    if (existing) return prev.map(item => item === existing ? { ...item, quantity: item.quantity + 1 } : item);
                    return [...prev, { ...product, selectedSize, quantity: 1 }];
                });
            };
            const removeFromCart = (index) => setCart(prev => prev.filter((_, i) => i !== index));
            const updateQuantity = (index, quantity) => setCart(prev => prev.map((item, i) => i === index ? { ...item, quantity } : item));
            const clearCart = () => setCart([]);
            
            const updateOrderStatus = (orderId, newStatus) => {
                setOrders(prev => prev.map(o => o.id === orderId ? { ...o, status: newStatus } : o));
            };

            return (
                <AppContext.Provider value={{ 
                    user, setUser, invitedAdmins, setInvitedAdmins,
                    products, setProducts, cart, addToCart, removeFromCart, updateQuantity, clearCart,
                    orders, setOrders, updateOrderStatus, customRequests, setCustomRequests
                }}>
                    {children}
                </AppContext.Provider>
            );
        }
        const useStore = () => useContext(AppContext);

        // ==========================================
        // 3. COMPONENTS
        // ==========================================

        function HomePage({ setCurrentTab, setSelectedProduct }) {
            const { products, addToCart } = useStore();
            return (
                <div className="max-w-7xl mx-auto px-4 py-6 pb-24">
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-900 tracking-tight">Customize shop</h1>
                            <p className="text-slate-500 mt-1">Discover unique creations</p>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
                        {products.length === 0 ? (
                            <div className="col-span-full text-center py-20 bg-white rounded-xl border border-slate-200 text-slate-500">
                                No products available at the moment.
                            </div>
                        ) : (
                            products.map(product => <ProductCard key={product.id} product={product} addToCart={addToCart} setCurrentTab={setCurrentTab} setSelectedProduct={setSelectedProduct} />)
                        )}
                    </div>
                </div>
            );
        }

        function ProductCard({ product, addToCart, setCurrentTab, setSelectedProduct }) {
            const [selectedSizeIndex, setSelectedSizeIndex] = useState(0);
            
            const hasSizes = product.sizes && product.sizes.length > 0;
            const currentSize = hasSizes ? product.sizes[selectedSizeIndex] : { name: 'Standard', price: product.price || 0 };
            const currentPrice = currentSize.price;
            const mainImage = product.images && product.images.length > 0 ? product.images[0] : (product.imageUrl || 'https://via.placeholder.com/300');

            const handleProductClick = () => {
                setSelectedProduct(product);
                setCurrentTab('details');
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden group flex flex-col">
                    <div onClick={handleProductClick} className="cursor-pointer aspect-square bg-slate-100 overflow-hidden relative">
                        <img src={mainImage} alt={product.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                        {product.images && product.images.length > 1 && (
                            <div className="absolute bottom-1 right-1 bg-black/60 text-white text-[10px] px-2 py-1 rounded">+{product.images.length - 1} Photos</div>
                        )}
                    </div>
                    <div className="p-3 sm:p-5 flex-1 flex flex-col">
                        <span className="text-[10px] sm:text-xs font-semibold text-blue-600 uppercase tracking-wider mb-1">{product.category}</span>
                        <h3 onClick={handleProductClick} className="cursor-pointer font-bold text-sm sm:text-lg text-slate-900 mb-1 line-clamp-1 hover:text-blue-600">{product.name}</h3>
                        
                        {hasSizes && (
                            <div className="mt-2 mb-3">
                                <select className="w-full border border-slate-300 rounded p-1 text-xs sm:text-sm bg-slate-50 outline-none" value={selectedSizeIndex} onChange={(e) => setSelectedSizeIndex(e.target.value)}>
                                    {product.sizes.map((s, i) => <option key={i} value={i}>{s.name} - ₹{s.price}</option>)}
                                </select>
                            </div>
                        )}
                        <div className="mt-auto flex items-center justify-between">
                            <span className="text-sm sm:text-xl font-bold text-slate-900">₹{parseFloat(currentPrice).toFixed(2)}</span>
                            <button onClick={() => addToCart(product, currentSize)} className="bg-slate-900 text-white p-2 rounded-lg hover:bg-slate-800 transition-colors flex items-center gap-2">
                                <Icons.ShoppingCart className="w-4 h-4 sm:w-5 sm:h-5" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function ProductDetailsPage({ product, setCurrentTab }) {
            const { addToCart } = useStore();
            const [selectedSizeIndex, setSelectedSizeIndex] = useState(0);

            if (!product) {
                setCurrentTab('home'); return null;
            }

            const hasSizes = product.sizes && product.sizes.length > 0;
            const currentSize = hasSizes ? product.sizes[selectedSizeIndex] : { name: 'Standard', price: product.price || 0 };
            const currentPrice = currentSize.price;
            const images = product.images && product.images.length > 0 ? product.images : [product.imageUrl || 'https://via.placeholder.com/300'];
            const fakeSales = Math.floor(Math.random() * (150 - 20 + 1)) + 20;

            return (
                <div className="max-w-4xl mx-auto bg-white min-h-screen pb-24 border-x border-slate-100 shadow-sm">
                    <div className="p-4 border-b flex items-center gap-3 sticky top-0 bg-white z-10 shadow-sm">
                        <button onClick={() => setCurrentTab('home')} className="text-slate-600 p-2 bg-slate-100 rounded-full hover:bg-slate-200">
                            <Icons.ArrowLeft className="w-5 h-5" />
                        </button>
                        <h1 className="text-lg font-bold line-clamp-1">{product.name}</h1>
                    </div>

                    <div className="p-4 sm:p-6">
                        <h2 className="text-2xl sm:text-3xl font-extrabold text-slate-900 mb-2">{product.name}</h2>
                        <p className="text-sm sm:text-base font-bold text-green-600 mb-6 flex items-center gap-2 bg-green-50 p-2 rounded-lg w-max">
                            🔥 {fakeSales} people bought this last month
                        </p>

                        <div className="flex overflow-x-auto gap-4 snap-x snap-mandatory pb-4 hide-scrollbar">
                            {images.map((img, idx) => (
                                <img key={idx} src={img} alt={`Slide ${idx}`} className="w-[85%] sm:w-[400px] h-[300px] sm:h-[400px] object-cover rounded-xl snap-center flex-shrink-0 border border-slate-200 shadow-sm" />
                            ))}
                        </div>
                        <p className="text-xs text-slate-400 text-center mt-1 mb-6">(Swipe sideways to view all photos)</p>

                        <div className="mt-4">
                            <h3 className="font-bold text-lg border-b pb-2 mb-3">Product Information</h3>
                            <p className="text-slate-600 text-base leading-relaxed mb-6">{product.description || 'No additional information available for this product.'}</p>
                        </div>

                        <div className="mt-6 p-5 bg-slate-50 rounded-xl border border-slate-200 shadow-inner">
                            {hasSizes && (
                                <div className="mb-4">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Select Size:</label>
                                    <select className="w-full sm:w-1/2 border border-slate-300 rounded-lg p-3 bg-white outline-none font-medium" value={selectedSizeIndex} onChange={(e) => setSelectedSizeIndex(e.target.value)}>
                                        {product.sizes.map((s, i) => <option key={i} value={i}>{s.name} - ₹{s.price}</option>)}
                                    </select>
                                </div>
                            )}
                            <div className="flex items-center justify-between mt-4 pt-4 border-t border-slate-200">
                                <div>
                                    <p className="text-sm text-slate-500">Total Price</p>
                                    <span className="text-3xl font-black text-slate-900">₹{parseFloat(currentPrice).toFixed(2)}</span>
                                </div>
                                <button onClick={() => { addToCart(product, currentSize); alert('Successfully added to cart!'); }} className="bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 font-bold flex items-center gap-2 shadow-lg">
                                    <Icons.ShoppingCart className="w-5 h-5" /> Add to Cart
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function CartPage({ setCurrentTab }) {
            const { cart, removeFromCart, updateQuantity, clearCart, user, setOrders } = useStore();
            const [isCheckingOut, setIsCheckingOut] = useState(false);
            const [success, setSuccess] = useState(false);
            
            const total = cart.reduce((sum, item) => sum + (parseFloat(item.selectedSize?.price || item.price) * item.quantity), 0);

            const handleCheckout = () => {
                if (!user) { setCurrentTab('auth'); return; }
                if (cart.length === 0) return;
                setIsCheckingOut(true);
                setTimeout(() => {
                    setOrders(prev => [{ 
                        id: 'ORD-' + Date.now(), 
                        userId: user.email, 
                        address: user, 
                        items: [...cart], 
                        total, 
                        date: new Date().toLocaleDateString(),
                        status: 'Pending'
                    }, ...prev]);
                    clearCart();
                    setSuccess(true);
                    setTimeout(() => setCurrentTab('profile'), 2000);
                }, 1500);
            };

            if (success) return (
                <div className="max-w-md mx-auto mt-20 p-8 bg-white rounded-xl shadow-sm border border-green-200 text-center">
                    <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icons.CreditCard className="w-8 h-8" /></div>
                    <h2 className="text-2xl font-bold text-slate-900 mb-2">Payment Successful!</h2>
                    <p className="text-slate-600">Your order has been placed.</p>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto px-4 py-6 pb-24">
                    <h1 className="text-3xl font-bold text-slate-900 mb-8 tracking-tight">Your Cart</h1>
                    {cart.length === 0 ? (
                        <div className="text-center py-20 bg-white rounded-xl border border-slate-200">
                            <Icons.ShoppingCart className="w-16 h-16 text-slate-300 mx-auto mb-4" />
                            <p className="text-slate-500 text-lg">Your cart is empty.</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 space-y-4">
                                {cart.map((item, index) => {
                                    const itemImage = item.images && item.images.length > 0 ? item.images[0] : item.imageUrl;
                                    const itemPrice = item.selectedSize?.price || item.price;
                                    return (
                                        <div key={index} className="flex flex-col sm:flex-row items-center gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                            <img src={itemImage} className="w-24 h-24 bg-slate-100 rounded-lg object-cover flex-shrink-0" />
                                            <div className="flex-1 text-center sm:text-left">
                                                <h3 className="font-semibold text-lg text-slate-900">{item.name}</h3>
                                                {item.selectedSize && <p className="text-sm text-slate-500">Size: {item.selectedSize.name}</p>}
                                                <p className="font-bold text-blue-600">₹{parseFloat(itemPrice).toFixed(2)}</p>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <div className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg p-1">
                                                    <button onClick={() => updateQuantity(index, Math.max(1, item.quantity - 1))} className="p-1"><Icons.Minus className="w-4 h-4" /></button>
                                                    <span className="w-8 text-center font-medium">{item.quantity}</span>
                                                    <button onClick={() => updateQuantity(index, item.quantity + 1)} className="p-1"><Icons.Plus className="w-4 h-4" /></button>
                                                </div>
                                                <button onClick={() => removeFromCart(index)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Icons.Trash2 className="w-5 h-5" /></button>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                            <div className="lg:col-span-1">
                                <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                    <h2 className="text-xl font-bold text-slate-900 mb-6">Order Summary</h2>
                                    <div className="space-y-4 mb-6 text-slate-600">
                                        <div className="flex justify-between"><span>Subtotal</span><span>₹{total.toFixed(2)}</span></div>
                                        <div className="border-t border-slate-200 pt-4 flex justify-between font-bold text-lg text-slate-900">
                                            <span>Total</span><span>₹{total.toFixed(2)}</span>
                                        </div>
                                    </div>
                                    <button onClick={handleCheckout} disabled={isCheckingOut} className="w-full py-3 bg-slate-900 text-white rounded-lg hover:bg-slate-800 font-medium flex items-center justify-center gap-2">
                                        <Icons.CreditCard className="w-5 h-5" /> Checkout
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function CustomRequestPage() {
            return (
                <div className="max-w-2xl mx-auto px-4 py-6 pb-24 text-center">
                    <h1 className="text-3xl font-bold text-slate-900 mb-4">Custom Request</h1>
                    <p className="text-slate-500">Feature disabled for update.</p>
                </div>
            );
        }

        function ProfilePage({ setCurrentTab }) {
            const { user, setUser, orders } = useStore();
            if (!user) { setCurrentTab('auth'); return null; }
            const myOrders = orders.filter(o => o.userId === user.email);

            const getStatusMessage = (status) => {
                if(status === 'Pending') return <span className="text-orange-500">⏳ Processing</span>;
                if(status === 'Confirmed') return <span className="text-blue-600">👍 Confirmed</span>;
                if(status === 'Shipped') return <span className="text-purple-600">🚚 Your order is on the way</span>;
                if(status === 'Delivered') return <span className="text-green-600">✅ Delivered</span>;
                return <span className="text-slate-500">{status}</span>;
            };

            return (
                <div className="max-w-4xl mx-auto px-4 py-6 pb-24">
                    <div className="flex justify-between items-center mb-8 pb-4 border-b">
                        <h1 className="text-3xl font-bold text-slate-900">My Profile</h1>
                        <button onClick={() => { setUser(null); setCurrentTab('home'); }} className="flex items-center gap-2 text-red-600 font-medium">
                            <Icons.LogOut className="w-5 h-5" /> Logout
                        </button>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
                        <h2 className="font-bold text-lg mb-4">Account Details</h2>
                        <p><strong>Name:</strong> {user.name}</p>
                        <p><strong>Email:</strong> {user.email}</p>
                        <p><strong>Mobile:</strong> {user.mobile}</p>
                        <p className="mt-2 text-sm text-slate-500"><strong>Address:</strong><br/>{user.village}, {user.locality}<br/>{user.stateDistrict} - {user.pincode}<br/>{user.country}</p>
                    </div>
                    
                    <h2 className="font-bold text-xl mb-4">Order History</h2>
                    {myOrders.length === 0 ? <p className="text-slate-500">No orders found.</p> : (
                        <div className="space-y-4">
                            {myOrders.map(o => (
                                <div key={o.id} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative">
                                    <div className="flex justify-between font-bold border-b pb-2 mb-2">
                                        <span>{o.id}</span>
                                        <span>{o.date}</span>
                                    </div>
                                    <div className="mb-3 font-bold text-sm bg-slate-50 p-2 rounded">
                                        Status: {getStatusMessage(o.status)}
                                    </div>
                                    {o.items.map(i => <div key={i.id} className="flex justify-between text-sm py-1"><span>{i.quantity}x {i.name} ({i.selectedSize?.name})</span><span>₹{(parseFloat(i.selectedSize?.price || i.price) * i.quantity).toFixed(2)}</span></div>)}
                                    <div className="flex justify-between font-bold mt-3 pt-2 border-t"><span>Total</span><span>₹{o.total.toFixed(2)}</span></div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // ADMIN PANEL
        // ==========================================
        function AdminPage({ setCurrentTab }) {
            const { user, products, setProducts, orders, updateOrderStatus, invitedAdmins, setInvitedAdmins } = useStore();
            const [adminTab, setAdminTab] = useState('products'); 
            const [view, setView] = useState('list');
            
            const [formData, setFormData] = useState({ id:'', name: '', description: '', category: '', images: [] });
            const [sizeCount, setSizeCount] = useState(1);
            const [sizes, setSizes] = useState([{ name: '', price: '' }]);

            if (!invitedAdmins.includes(user?.email)) { setCurrentTab('home'); return null; }

            const handleDelete = (id) => setProducts(products.filter(p => p.id !== id));
            
            const handleSizeCountChange = (e) => {
                const count = parseInt(e.target.value, 10);
                setSizeCount(count);
                setSizes(prev => {
                    const newSizes = [...prev];
                    if (count > newSizes.length) {
                        for (let i = newSizes.length; i < count; i++) newSizes.push({ name: '', price: '' });
                    } else if (count < newSizes.length) {
                        newSizes.length = count; 
                    }
                    return newSizes;
                });
            };

            const handleSizeInput = (index, field, value) => {
                setSizes(prev => {
                    const newSizes = [...prev];
                    newSizes[index][field] = value;
                    return newSizes;
                });
            };

            const handleImageUpload = (e) => {
                const files = Array.from(e.target.files);
                if (files.length > 0) {
                    const readers = files.map(file => {
                        return new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result);
                            reader.readAsDataURL(file);
                        });
                    });
                    Promise.all(readers).then(imagesBase64 => setFormData(prev => ({ ...prev, images: [...prev.images, ...imagesBase64] })));
                }
            };

            const removeImage = (index) => {
                setFormData(prev => {
                    const newImages = [...prev.images];
                    newImages.splice(index, 1);
                    return { ...prev, images: newImages };
                });
            };

            const handleSave = (e) => {
                e.preventDefault();
                const formattedSizes = sizes.map(s => ({ name: s.name, price: parseFloat(s.price) || 0 }));
                const payload = { ...formData, sizes: formattedSizes, price: formattedSizes[0]?.price || 0 };
                
                if (formData.id) setProducts(products.map(p => p.id === formData.id ? payload : p));
                else setProducts([{ ...payload, id: 'p' + Date.now() }, ...products]);
                setView('list');
            };

            const resetForm = () => {
                setFormData({ id:'', name: '', description: '', category: '', images: [] });
                setSizeCount(1);
                setSizes([{ name: '', price: '' }]);
                setView('add');
            };

            const handleInviteAdmin = () => {
                const newAdmin = prompt("Enter the email ID of the new admin:");
                if(newAdmin) {
                    setInvitedAdmins([...invitedAdmins, newAdmin]);
                    alert(`${newAdmin} has been added as an admin!`);
                }
            };

            return (
                <div className="max-w-5xl mx-auto px-4 py-6 pb-24">
                    <div className="flex items-center justify-between mb-8 pb-4 border-b border-slate-200">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-slate-900 text-white rounded-lg flex items-center justify-center"><Icons.LayoutDashboard className="w-6 h-6" /></div>
                            <div><h1 className="text-2xl font-bold text-slate-900">Admin Dashboard</h1></div>
                        </div>
                        <button onClick={handleInviteAdmin} className="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg font-bold">+ Invite Admin</button>
                    </div>

                    <div className="flex gap-4 mb-6">
                        <button onClick={() => setAdminTab('products')} className={`px-4 py-2 font-bold rounded-lg ${adminTab === 'products' ? 'bg-slate-900 text-white' : 'bg-slate-200 text-slate-700'}`}>Products</button>
                        <button onClick={() => setAdminTab('orders')} className={`px-4 py-2 font-bold rounded-lg ${adminTab === 'orders' ? 'bg-slate-900 text-white' : 'bg-slate-200 text-slate-700'}`}>Customer Orders</button>
                    </div>

                    {/* Products Tab */}
                    {adminTab === 'products' && (
                        <div>
                            <div className="flex justify-end mb-4">
                                {view === 'list' ? (
                                    <button onClick={resetForm} className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg font-medium"><Icons.Plus className="w-5 h-5" /> Add Product</button>
                                ) : (
                                    <button onClick={() => setView('list')} className="flex items-center gap-2 text-slate-600 font-medium"><Icons.ArrowLeft className="w-5 h-5" /> Back</button>
                                )}
                            </div>

                            {view === 'list' && (
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    <table className="w-full text-left text-sm text-slate-600">
                                        <thead className="bg-slate-50 border-b text-slate-700">
                                            <tr><th className="px-6 py-4">Product</th><th className="px-6 py-4">Price</th><th className="px-6 py-4 text-right">Actions</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-200">
                                            {products.length === 0 && <tr><td colSpan="3" className="text-center py-6">No products found.</td></tr>}
                                            {products.map(p => (
                                                <tr key={p.id} className="hover:bg-slate-50">
                                                    <td className="px-6 py-4 flex gap-4 items-center">
                                                        <img src={p.images && p.images[0] ? p.images[0] : p.imageUrl} className="w-12 h-12 rounded object-cover border" />
                                                        <div><p className="font-medium text-slate-900">{p.name}</p><p className="text-xs line-clamp-1">{p.category}</p></div>
                                                    </td>
                                                    <td className="px-6 py-4 font-medium">₹{p.price.toFixed(2)}</td>
                                                    <td className="px-6 py-4 text-right">
                                                        <button onClick={() => { setFormData(p); setSizes(p.sizes || [{name: '', price: ''}]); setSizeCount(p.sizes?.length || 1); setView('edit'); }} className="p-2 text-slate-400 hover:text-blue-600"><Icons.Edit className="w-5 h-5" /></button>
                                                        <button onClick={() => handleDelete(p.id)} className="p-2 text-slate-400 hover:text-red-600"><Icons.Trash2 className="w-5 h-5" /></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {(view === 'add' || view === 'edit') && (
                                <form onSubmit={handleSave} className="bg-white p-6 rounded-xl border border-slate-200 space-y-6">
                                    <div className="space-y-4">
                                        <h3 className="font-bold text-lg border-b pb-2">Basic Details</h3>
                                        <input type="text" placeholder="Product Name" required className="w-full p-2 border rounded" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                        <input type="text" placeholder="Category" required className="w-full p-2 border rounded" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} />
                                        <textarea placeholder="Description" required className="w-full p-2 border rounded" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} />
                                    </div>
                                    <div className="space-y-4">
                                        <h3 className="font-bold text-lg border-b pb-2">Upload Photos (Select Multiple)</h3>
                                        <input type="file" multiple accept="image/*" onChange={handleImageUpload} className="w-full border p-2 bg-slate-50 rounded" />
                                        {formData.images.length > 0 && (
                                            <div className="flex flex-wrap gap-2 mt-2">
                                                {formData.images.map((imgBase64, idx) => (
                                                    <div key={idx} className="relative w-20 h-20 border rounded overflow-hidden">
                                                        <img src={imgBase64} className="w-full h-full object-cover" />
                                                        <button type="button" onClick={() => removeImage(idx)} className="absolute top-0 right-0 bg-red-600 text-white text-xs px-1 rounded-bl">X</button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    <div className="space-y-4">
                                        <h3 className="font-bold text-lg border-b pb-2">Size & Pricing</h3>
                                        <div>
                                            <label className="text-sm font-bold text-slate-700 block mb-1">How many size options do you want to provide?</label>
                                            <select value={sizeCount} onChange={handleSizeCountChange} className="w-full sm:w-1/3 border p-2 rounded bg-white">
                                                {[...Array(10)].map((_, i) => <option key={i+1} value={i+1}>{i+1} Sizes</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-3 mt-4">
                                            {sizes.map((size, idx) => (
                                                <div key={idx} className="flex gap-4 items-center bg-slate-50 p-3 rounded border">
                                                    <span className="font-bold text-slate-500 w-6">{idx + 1}.</span>
                                                    <div className="flex-1"><input type="text" placeholder="Size Name (e.g., Size 1)" required className="w-full p-2 border rounded" value={size.name} onChange={(e) => handleSizeInput(idx, 'name', e.target.value)} /></div>
                                                    <div className="flex-1"><input type="number" step="0.01" placeholder="Price (₹)" required className="w-full p-2 border rounded" value={size.price} onChange={(e) => handleSizeInput(idx, 'price', e.target.value)} /></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-slate-900 text-white p-3 rounded font-bold text-lg hover:bg-slate-800">Save Product</button>
                                </form>
                            )}
                        </div>
                    )}
                    
                    {/* Orders Tab */}
                    {adminTab === 'orders' && (
                        <div className="space-y-4">
                            {orders.length === 0 ? <p className="text-slate-500 bg-white p-6 border rounded-xl">No orders have been placed yet.</p> : (
                                orders.map(o => (
                                    <div key={o.id} className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                        <div className="flex justify-between font-bold border-b pb-2 mb-2">
                                            <span>Order: {o.id}</span>
                                            <span className="text-blue-600">₹{o.total.toFixed(2)}</span>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div>
                                                <p className="text-sm font-bold text-slate-700">Customer Details:</p>
                                                <p className="text-sm text-slate-600">Name: {o.address?.name}<br/>Mobile: {o.address?.mobile}</p>
                                            </div>
                                            <div>
                                                <p className="text-sm font-bold text-slate-700">Delivery Address:</p>
                                                <p className="text-sm text-slate-600 bg-slate-50 p-2 rounded border">
                                                    {o.address?.village}, {o.address?.locality}<br/>
                                                    {o.address?.stateDistrict} - {o.address?.pincode}<br/>
                                                    {o.address?.country}
                                                </p>
                                            </div>
                                        </div>

                                        <div className="mt-4 p-3 bg-blue-50 border border-blue-100 rounded-lg">
                                            <p className="font-bold text-blue-900 border-b border-blue-200 pb-2 mb-3">Items to Pack (Photo & Quantity):</p>
                                            <div className="space-y-3">
                                                {o.items.map((item, idx) => {
                                                    const itemImage = item.images && item.images.length > 0 ? item.images[0] : (item.imageUrl || 'https://via.placeholder.com/100');
                                                    return (
                                                        <div key={idx} className="flex items-center justify-between bg-white p-3 rounded-lg border border-blue-100 shadow-sm">
                                                            <div className="flex items-center gap-4">
                                                                {/* Image Display inside Admin Order Details */}
                                                                <img src={itemImage} alt={item.name} onError={(e) => { e.target.onerror = null; e.target.src="https://via.placeholder.com/100?text=No+Image" }} className="w-16 h-16 object-cover rounded-md border border-slate-200 flex-shrink-0" />
                                                                <div>
                                                                    <p className="font-bold text-slate-800 leading-tight">{item.name}</p>
                                                                    <p className="text-xs text-slate-500 mb-1">Size: {item.selectedSize?.name || 'Standard'}</p>
                                                                    <p className="text-sm font-black text-blue-700 bg-blue-100 px-2 py-1 rounded inline-block">Quantity: {item.quantity}</p>
                                                                </div>
                                                            </div>
                                                            <span className="font-bold text-slate-800 pr-2">₹{(parseFloat(item.selectedSize?.price || item.price) * item.quantity).toFixed(2)}</span>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </div>

                                        <div className="mt-4 flex flex-col sm:flex-row items-center justify-between border-t pt-4 gap-4">
                                            <div className={`text-sm font-bold px-3 py-1.5 rounded-full border ${o.status === 'Pending' ? 'bg-orange-50 text-orange-600 border-orange-200' : o.status === 'Confirmed' ? 'bg-blue-50 text-blue-600 border-blue-200' : o.status === 'Shipped' ? 'bg-purple-50 text-purple-600 border-purple-200' : 'bg-green-50 text-green-600 border-green-200'}`}>
                                                Status: {o.status}
                                            </div>
                                            
                                            <div className="flex gap-2 w-full sm:w-auto">
                                                {o.status === 'Pending' && <button onClick={() => updateOrderStatus(o.id, 'Confirmed')} className="flex-1 sm:flex-none bg-blue-600 text-white font-bold text-sm px-4 py-2 rounded-lg shadow hover:bg-blue-700 transition">Confirm Order</button>}
                                                {o.status === 'Confirmed' && <button onClick={() => updateOrderStatus(o.id, 'Shipped')} className="flex-1 sm:flex-none bg-purple-600 text-white font-bold text-sm px-4 py-2 rounded-lg shadow hover:bg-purple-700 transition">Pack & Ship</button>}
                                                {o.status === 'Shipped' && <button onClick={() => updateOrderStatus(o.id, 'Delivered')} className="flex-1 sm:flex-none bg-green-600 text-white font-bold text-sm px-4 py-2 rounded-lg shadow hover:bg-green-700 transition">Mark Delivered</button>}
                                            </div>
                                        </div>

                                    </div>
                                ))
                            )}
                        </div>
                    )}
                </div>
            );
        }
